<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOKSTORE</title>
    <link rel="stylesheet" href="STYLE FOR LOGIN.CSS">
</head>

<body>
    <div class="main">
        <input type="checkbox" id="chk" aria-hidden="true">

        <div class="login">
            <form action="index.html">
                <label for="chk">Login</label>
                <input type="text" name="username" placeholder="Username" required="">
                <input type="password" name="password" placeholder="Password" required="">
                <a href="#" id="link">forgot password</a>
                <button type="submit">Log in</button>
            </form>
        </div>

        <div class="signup">
            <form action="https://sheetdb.io/api/v1/1c5duxrmofeel" method="post" id="loginForm">
                <label for="chk">Sign up</label>
                <input type="text" name="data[name]" placeholder="Name" required="">
                <input type="email" name="data[email]" placeholder="Email" required="">
                <input type="password" name="data[password]" placeholder="Password" required="">
                <button type="submit" onclick="submitForm(event)">Sign up</button>
            </form>
        </div>
    </div>

    <script>
        /* google sheets */
        var form = document.getElementById('loginForm');
        form.addEventListener("submit", function (e) {
            e.preventDefault();
            fetch(form.action, {
                method: "POST",
                body: new FormData(document.getElementById("loginForm"))
            })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        });
        /* reload page 0.5s*/
        function submitForm(event) {
            event.preventDefault();
            document.getElementById("loginForm").submit();
            setTimeout(function () {
                location.reload();
            }, 500);
        }

    </script>


</body>

</html>
